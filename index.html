<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>APRIORI Team Dashboard</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#243349; --text:#e2e8f0; --muted:#94a3b8;
    --line:#334155; --accent:#38bdf8;
    --bronze:#cd7f32; --silber:#c0c0c0; --gold:#f1c40f; --ok:#22c55e; --red:#ef4444;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--text);padding:32px;line-height:1.45}
  .wrap{max-width:1100px;margin:0 auto}
  header{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-end;gap:12px;margin-bottom:28px}
  h1{margin:0;font-size:26px;letter-spacing:.3px}
  .subtitle{color:var(--muted);font-size:14px;margin-top:4px}
  .quarter{color:var(--accent);font-weight:600;margin-top:2px}
  .headright{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
  .updated{color:var(--muted);font-size:13px}
  .livebadge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;
             background:rgba(34,197,94,.12);color:var(--ok);border:1px solid rgba(34,197,94,.4)}
  .reload{background:var(--card2);color:var(--text);border:1px solid var(--line);border-radius:999px;
          padding:6px 14px;font-size:13px;cursor:pointer}
  .reload:hover{border-color:var(--accent)}
  .reload:disabled{opacity:.5;cursor:default}
  .grid{display:grid;gap:18px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(220px,1fr));margin-bottom:28px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px}
  .card .label{color:var(--muted);font-size:13px;text-transform:uppercase;letter-spacing:.5px}
  .card .value{font-size:30px;font-weight:700;margin-top:6px}
  .card .sub{color:var(--muted);font-size:13px;margin-top:4px}
  .mini{position:relative;height:8px;background:var(--card2);border-radius:999px;overflow:hidden;margin-top:12px}
  .mini > span{position:absolute;left:0;top:0;height:100%;border-radius:999px;background:linear-gradient(90deg,#0ea5e9,#22d3ee)}
  .section-title{font-size:15px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:8px 0 14px}
  .goals{margin-bottom:30px}
  .goalbar{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px}
  .tierline{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:13px;color:var(--muted);margin-bottom:10px}
  .track{position:relative;height:34px;background:var(--card2);border-radius:18px;overflow:hidden}
  .fill{position:absolute;left:0;top:0;height:100%;border-radius:18px;
        background:linear-gradient(90deg,#0ea5e9,#22d3ee);transition:width .6s ease}
  .marks{position:relative;height:46px;margin-top:8px}
  .mark{position:absolute;transform:translateX(-50%);text-align:center;font-size:12px;color:var(--muted)}
  .mark b{display:block;color:var(--text);font-size:13px}
  .mark.bronze b{color:var(--bronze)} .mark.silber b{color:var(--silber)} .mark.gold b{color:var(--gold)}
  .badge{display:inline-block;margin-top:14px;padding:6px 14px;border-radius:999px;font-weight:700;font-size:14px;
         background:var(--card2);border:1px solid var(--line)}
  .badge.bronze{color:var(--bronze)} .badge.silber{color:var(--silber)} .badge.gold{color:var(--gold)}
  .battle{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;
          background:var(--card);border:1px solid var(--line);border-radius:14px;padding:24px;margin-bottom:30px}
  .side{text-align:center}
  .side .loc{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .side .big{font-size:44px;font-weight:800;margin:4px 0}
  .side .cap{font-size:12px;color:var(--muted)}
  .side.win .big{color:var(--accent)}
  .vs{font-size:14px;color:var(--muted);font-weight:700}
  .lbcols{grid-template-columns:repeat(auto-fit,minmax(320px,1fr));margin-bottom:30px}
  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  th,td{text-align:left;padding:11px 16px;border-bottom:1px solid var(--line);font-size:14px}
  th{color:var(--muted);font-weight:600;text-transform:uppercase;font-size:12px;letter-spacing:.5px}
  tr:last-child td{border-bottom:none}
  td.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:700}
  .rank{width:34px;color:var(--muted)}
  .ini{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:999px;
       background:var(--card2);border:1px solid var(--line);font-size:12px;font-weight:700;margin-right:10px}
  .loc-tag{font-size:11px;padding:2px 8px;border-radius:999px;background:var(--card2);border:1px solid var(--line);color:var(--muted);margin-left:8px}
  .errorbox{grid-column:1/-1;background:var(--card);border:1px solid #7f1d1d;border-radius:14px;padding:20px}
  .errorbox .label{color:#fca5a5}
  .errorbox .msg{margin-top:6px;color:var(--muted);font-size:14px}
  footer{margin-top:30px;color:var(--muted);font-size:12px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1 id="title">Team Dashboard</h1>
      <div class="subtitle" id="subtitle"></div>
      <div class="quarter" id="quarter"></div>
    </div>
    <div class="headright">
      <span class="livebadge" id="live">Vincere Live</span>
      <button class="reload" id="reload" type="button">Aktualisieren</button>
      <div class="updated" id="updated">Lade Daten…</div>
    </div>
  </header>

  <div class="grid kpis" id="kpis"></div>

  <div class="goals">
    <div class="section-title">Quartals-Challenge · Neue Deals (Experts)</div>
    <div class="goalbar" id="goalbar"></div>
  </div>

  <div class="section-title">Standort-Battle · Frankfurt vs. Berlin</div>
  <div id="battleWrap"></div>

  <div class="section-title">Leaderboard · Deals je Recruiter</div>
  <div class="grid lbcols" id="leaderWrap"></div>

  <footer>APRIORI · automatisch aktualisiert über n8n &amp; Vincere</footer>
</div>

<script>
// Quelle der Daten: overview-config.json direkt aus dem GitHub-Repo (Branch main).
const CONFIG_URL = "https://raw.githubusercontent.com/luisbodenbachapriori/Dealuebersicht/main/overview-config.json";

const num = n => new Intl.NumberFormat("de-DE").format(n||0);

function progress(cur, tgt){ return tgt>0 ? Math.min(100,(cur/tgt)*100) : 0; }

function render(cfg){
  const meta=cfg.meta||{}, goals=cfg.goals||{}, kpis=cfg.kpis||{},
        totals=cfg.totals||{}, locations=cfg.locations||[], lb=cfg.leaderboard||{};

  document.getElementById("title").textContent = meta.title || "Team Dashboard";
  document.getElementById("subtitle").textContent = meta.subtitle || "";
  document.getElementById("quarter").textContent = meta.quarter ? "Überblick "+meta.quarter : "";
  document.getElementById("live").textContent = meta.source ? meta.source : "Vincere Live";
  if(meta.lastUpdated){
    const d=new Date(meta.lastUpdated);
    document.getElementById("updated").textContent =
      "Stand: "+d.toLocaleString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
  } else { document.getElementById("updated").textContent = ""; }

  // ---- KPI-Karten ----
  const runner=kpis.activeRunner||{}, dealsE=kpis.dealsExperts||{},
        rahmen=kpis.rahmenvertraege||{}, team=kpis.teamSize||{};
  const kpiCards = [
    runner.target!=null ? {l:"Aktive Runner", v:num(runner.current)+" / "+num(runner.target),
        sub:"Jahresziel · noch "+num(Math.max(0,(runner.target||0)-(runner.current||0)))+" bis Ziel",
        p:progress(runner.current,runner.target)} : null,
    dealsE.target!=null ? {l:"Deals "+(meta.quarter||"")+" · Experts", v:num(dealsE.current)+" / "+num(dealsE.target),
        sub:"Gold-Ziel "+num(dealsE.target), p:progress(dealsE.current,dealsE.target)} : null,
    rahmen.target!=null ? {l:"Rahmenverträge", v:num(rahmen.current)+" / "+num(rahmen.target),
        sub:"Ziel · noch "+num(Math.max(0,(rahmen.target||0)-(rahmen.current||0)))+" Partner",
        p:progress(rahmen.current,rahmen.target)} : null,
    team.total!=null ? {l:"Team-Größe", v:num(team.total)+" Köpfe",
        sub:[team.recruiting!=null?num(team.recruiting)+" Recruiting":null,
             team.kam!=null?num(team.kam)+" KAM":null,
             team.berlin!=null?num(team.berlin)+" Berlin":null].filter(Boolean).join(" · ")} : null
  ].filter(Boolean);
  document.getElementById("kpis").innerHTML = kpiCards.map(k=>
    `<div class="card"><div class="label">${k.l}</div><div class="value">${k.v}</div>`+
    (k.sub?`<div class="sub">${k.sub}</div>`:"")+
    (k.p!=null?`<div class="mini"><span style="width:${k.p}%"></span></div>`:"")+
    `</div>`).join("");

  // ---- Ziel-Stufen in Deal-Count ----
  const cur = totals.dealsExperts!=null ? totals.dealsExperts : (dealsE.current||0);
  const tiers = ["bronze","silber","gold"].map(k=>goals[k]).filter(t=>t&&t.target!=null);
  const maxTarget = Math.max(1, ...tiers.map(t=>t.target||0));
  const pct = Math.min(100,(cur/maxTarget)*100);
  let reached=null, next=null;
  ["bronze","silber","gold"].forEach(k=>{ const t=goals[k];
    if(t&&t.target!=null){ if(cur>=t.target) reached=t; else if(!next) next=t; } });
  const marks = tiers.map(t=>{
    const left=Math.min(100,((t.target||0)/maxTarget)*100);
    const cls=(t.label||"").toLowerCase();
    const medal = cls==="bronze"?"🥉":cls==="silber"?"🥈":cls==="gold"?"🥇":"";
    return `<div class="mark ${cls}" style="left:${left}%"><b>${medal} ${t.label}</b>${num(t.target)} Deals</div>`;
  }).join("");
  const nextLine = next ? `▲ noch ${num(Math.max(0,(next.target||0)-cur))} bis ${next.label}`
                        : (reached?`Top-Stufe ${reached.label} erreicht 🎉`:"");
  document.getElementById("goalbar").innerHTML =
    `<div class="tierline"><span>Aktuell: <b style="color:var(--text)">${num(cur)} Deals</b></span><span>${nextLine}</span></div>`+
    `<div class="track"><div class="fill" style="width:${pct}%"></div></div>`+
    `<div class="marks">${marks}</div>`+
    (reached ? `<span class="badge ${(reached.label||"").toLowerCase()}">★ ${reached.label} erreicht</span>`
             : `<span class="badge">Noch kein Tier erreicht</span>`);

  // ---- Standort-Battle ----
  const ffm = locations.find(l=>(l.code||"").toUpperCase()==="FFM") || locations[0] || {};
  const ber = locations.find(l=>(l.code||"").toUpperCase()==="B" || (l.name||"").toLowerCase().includes("berlin")) || locations[1] || {};
  const fd=ffm.dealsExperts||0, bd=ber.dealsExperts||0;
  document.getElementById("battleWrap").innerHTML =
    `<div class="battle">`+
    `<div class="side ${fd>=bd?"win":""}"><div class="loc">${ffm.name||"Frankfurt"}</div>`+
    `<div class="big">${num(fd)}</div><div class="cap">Deals${ffm.activeRunner!=null?" · "+num(ffm.activeRunner)+" Runner":""}</div></div>`+
    `<div class="vs">VS</div>`+
    `<div class="side ${bd>fd?"win":""}"><div class="loc">${ber.name||"Berlin"}</div>`+
    `<div class="big">${num(bd)}</div><div class="cap">Deals${ber.activeRunner!=null?" · "+num(ber.activeRunner)+" Runner":""}</div></div>`+
    `</div>`;

  // ---- Leaderboard ----
  function lbTable(title, rows){
    if(!rows||!rows.length) return "";
    const sorted=[...rows].sort((a,b)=>(b.deals||0)-(a.deals||0));
    const body=sorted.map((r,i)=>{
      const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":(i+1);
      return `<tr><td class="rank">${medal}</td>`+
        `<td><span class="ini">${r.initials||""}</span>${r.name||""}`+
        `${r.location?`<span class="loc-tag">${r.location}</span>`:""}</td>`+
        `<td class="num">${num(r.deals)}</td></tr>`;
    }).join("");
    return `<div><div class="section-title" style="margin-bottom:10px">${title}</div>`+
      `<table><thead><tr><th class="rank">#</th><th>Recruiter</th><th class="num">Deals</th></tr></thead>`+
      `<tbody>${body}</tbody></table></div>`;
  }
  document.getElementById("leaderWrap").innerHTML =
    lbTable("Experts", lb.experts) + lbTable("Contracting", lb.contracting)
    || `<div class="card"><div class="sub">Noch keine Leaderboard-Daten.</div></div>`;
}

function showError(msg){
  document.getElementById("updated").textContent = "Laden fehlgeschlagen";
  document.getElementById("kpis").innerHTML =
    `<div class="errorbox"><div class="label">Fehler beim Laden der Daten</div>`+
    `<div class="msg">${msg}</div></div>`;
  ["goalbar","battleWrap","leaderWrap"].forEach(id=>document.getElementById(id).innerHTML="");
}

async function load(){
  const btn = document.getElementById("reload");
  btn.disabled = true;
  document.getElementById("updated").textContent = "Lade Daten…";
  try{
    const res = await fetch(CONFIG_URL + "?t=" + Date.now(), { cache: "no-store" });
    if(!res.ok) throw new Error("HTTP " + res.status + " beim Abruf der Config");
    let cfg = await res.json();
    if(Array.isArray(cfg)) cfg = cfg[0] || {};
    render(cfg);
  }catch(e){
    showError(e.message + " — Prüfe, ob overview-config.json im Repo liegt und das Repo öffentlich ist.");
  }finally{
    btn.disabled = false;
  }
}

document.getElementById("reload").addEventListener("click", load);
load();
</script>
</body>
</html>
