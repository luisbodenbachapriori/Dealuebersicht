<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>APRIORI Team Dashboard</title>
<style>
  :root{
    --bg:#161b24; --panel:#1b2230; --card:#222b3b; --card2:#2c3647;
    --text:#eef2f8; --muted:#9aa7bd; --muted2:#6b7689; --line:rgba(255,255,255,.08);
    --red:#e63a5e; --red-deep:#c10230; --red-dark:#8c0123;
    --blue:#3d8bff; --gold:#f5c518; --green:#2fbf71;
    --bronze:#cd7f32; --silber:#c4ccd6;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:radial-gradient(1200px 600px at 70% -10%,#1d2533 0%,var(--bg) 60%);color:var(--text);
       padding:28px;line-height:1.45;min-height:100vh}
  .wrap{max-width:1120px;margin:0 auto}

  header{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:22px}
  .brand{display:flex;align-items:center;gap:14px}
  .logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--red),var(--red-deep));
        display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#fff;letter-spacing:.5px;
        box-shadow:0 6px 18px rgba(193,2,48,.35)}
  h1{margin:0;font-size:23px;letter-spacing:.2px;font-weight:750}
  .subtitle{color:var(--muted);font-size:13px;margin-top:3px}
  .quarter{color:var(--red);font-weight:700;font-size:13px;margin-top:2px;letter-spacing:.3px}
  .headright{display:flex;flex-direction:column;align-items:flex-end;gap:9px}
  .live{display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;
        background:rgba(47,191,113,.12);color:var(--green);border:1px solid rgba(47,191,113,.35)}
  .live .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(47,191,113,.5)}70%{box-shadow:0 0 0 7px rgba(47,191,113,0)}100%{box-shadow:0 0 0 0 rgba(47,191,113,0)}}
  .updated{color:var(--muted2);font-size:12px}
  .reload{background:var(--card2);color:var(--text);border:1px solid var(--line);border-radius:999px;
          padding:6px 14px;font-size:12px;cursor:pointer}
  .reload:hover{border-color:var(--red)}
  .reload:disabled{opacity:.5;cursor:default}

  .toolbar{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:24px}
  .seg{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:4px;gap:2px}
  .seg button{border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:600;
              padding:7px 16px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:all .15s}
  .seg button:hover{color:var(--text)}
  .seg.sparte button.active{background:linear-gradient(135deg,var(--red),var(--red-deep));color:#fff;
                            box-shadow:0 3px 10px rgba(193,2,48,.3)}
  .seg.loc button.active{background:var(--card2);color:var(--text);border:1px solid var(--line)}

  .grid{display:grid;gap:16px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(216px,1fr));margin-bottom:26px}
  .card{background:linear-gradient(180deg,var(--card) 0%,var(--panel) 100%);border:1px solid var(--line);
        border-radius:16px;padding:18px 20px}
  .card .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.6px;font-weight:600}
  .card .value{font-size:30px;font-weight:800;margin-top:6px;letter-spacing:.3px}
  .card .value .of{color:var(--muted2);font-size:20px;font-weight:600}
  .card .sub{color:var(--muted2);font-size:12px;margin-top:5px}
  .mini{position:relative;height:7px;background:var(--card2);border-radius:999px;overflow:hidden;margin-top:13px}
  .mini > span{position:absolute;left:0;top:0;height:100%;border-radius:999px}
  .mini.red > span{background:linear-gradient(90deg,var(--red-dark),var(--red))}
  .mini.blue > span{background:linear-gradient(90deg,#1f5fd6,var(--blue))}
  .card.accent{border-color:rgba(230,58,94,.35)}
  .card.accent .value{color:#fff}

  .section-title{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);text-transform:uppercase;
                 letter-spacing:.7px;margin:6px 0 13px;font-weight:700}
  .sq{width:11px;height:11px;border-radius:3px;background:var(--red);display:inline-block;flex:none}
  .pill{margin-left:auto;font-size:11px;font-weight:600;color:var(--muted2);text-transform:none;letter-spacing:0}

  .goals{margin-bottom:28px}
  .goalbar{background:linear-gradient(180deg,var(--card),var(--panel));border:1px solid var(--line);border-radius:16px;padding:22px}
  .tierline{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:13px;color:var(--muted);margin-bottom:12px}
  .track{position:relative;height:36px;background:var(--card2);border-radius:18px;overflow:hidden}
  .fill{position:absolute;left:0;top:0;height:100%;border-radius:18px;
        background:linear-gradient(90deg,var(--red-dark),var(--red));transition:width .7s ease}
  .marks{position:relative;height:48px;margin-top:10px}
  .mark{position:absolute;transform:translateX(-50%);text-align:center;font-size:12px;color:var(--muted2)}
  .mark b{display:block;color:var(--text);font-size:13px}
  .mark.bronze b{color:var(--bronze)} .mark.silber b{color:var(--silber)} .mark.gold b{color:var(--gold)}
  .badge{display:inline-block;margin-top:14px;padding:6px 14px;border-radius:999px;font-weight:700;font-size:13px;
         background:var(--card2);border:1px solid var(--line)}
  .badge.bronze{color:var(--bronze)} .badge.silber{color:var(--silber)} .badge.gold{color:var(--gold)}

  .battle{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;
          background:linear-gradient(180deg,var(--card),var(--panel));border:1px solid var(--line);
          border-radius:16px;padding:26px;margin-bottom:28px}
  .side{text-align:center;border-radius:14px;padding:14px 8px}
  .side .loc{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:700}
  .side .big{font-size:46px;font-weight:850;margin:6px 0;line-height:1}
  .side .cap{font-size:12px;color:var(--muted2)}
  .side.win{background:rgba(230,58,94,.08)}
  .side.win .big{color:var(--red)}
  .vs{font-size:13px;color:var(--muted2);font-weight:800;letter-spacing:1px}

  .lbcols{grid-template-columns:repeat(auto-fit,minmax(340px,1fr));margin-bottom:28px;align-items:start}
  .lbcard{background:linear-gradient(180deg,var(--card),var(--panel));border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .lbhead{padding:15px 18px;border-bottom:1px solid var(--line);font-size:12px;text-transform:uppercase;letter-spacing:.6px;
          color:var(--muted);font-weight:700;display:flex;align-items:center;gap:8px}
  .row{display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:none}
  .rank{width:26px;text-align:center;font-weight:800;color:var(--muted2);font-size:14px;flex:none}
  .ini{flex:none;width:34px;height:34px;border-radius:50%;background:var(--card2);border:1px solid var(--line);
       display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
  .who{flex:1;min-width:0}
  .who .nm{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .loc-tag{font-size:10px;padding:2px 7px;border-radius:999px;background:var(--card2);border:1px solid var(--line);
           color:var(--muted);margin-left:7px;vertical-align:middle}
  .dealn{flex:none;font-variant-numeric:tabular-nums;font-weight:800;font-size:16px}
  .dealn small{color:var(--muted2);font-weight:600;font-size:12px;margin-left:3px}
  .empty{padding:18px;color:var(--muted2);font-size:13px}

  .errorbox{grid-column:1/-1;background:var(--card);border:1px solid #7f1d1d;border-radius:16px;padding:20px}
  .errorbox .label{color:#fca5a5}
  .errorbox .msg{margin-top:6px;color:var(--muted);font-size:14px}
  footer{margin-top:30px;color:var(--muted2);font-size:12px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo">A</div>
      <div>
        <h1 id="title">Team Dashboard</h1>
        <div class="subtitle" id="subtitle"></div>
        <div class="quarter" id="quarter"></div>
      </div>
    </div>
    <div class="headright">
      <span class="live"><span class="dot"></span><span id="liveText">Vincere Live</span></span>
      <button class="reload" id="reload" type="button">Aktualisieren</button>
      <div class="updated" id="updated">Lade Daten…</div>
    </div>
  </header>

  <div class="toolbar" id="toolbar">
    <div class="seg sparte" data-group="sparte">
      <button data-val="gesamt" class="active">Gesamt</button>
      <button data-val="experts">Experts</button>
      <button data-val="contracting">Contracting</button>
    </div>
    <div class="seg loc" data-group="location">
      <button data-val="all" class="active">Alle Standorte</button>
      <button data-val="FFM">Frankfurt</button>
      <button data-val="B">Berlin</button>
    </div>
  </div>

  <div class="grid kpis" id="kpis"></div>

  <div class="goals">
    <div class="section-title"><span class="sq"></span><span id="goalTitle">Quartals-Challenge · Neue Deals</span> <span class="pill">Gold / Silber / Bronze</span></div>
    <div class="goalbar" id="goalbar"></div>
  </div>

  <div class="section-title"><span class="sq"></span>Standort-Battle · Frankfurt vs. Berlin <span class="pill" id="battlePill">Deals</span></div>
  <div id="battleWrap"></div>

  <div class="section-title"><span class="sq"></span>Leaderboard · Placements je Recruiter</div>
  <div class="grid lbcols" id="leaderWrap"></div>

  <footer>Datenquelle: Vincere CRM (Live-Sync) · automatisch aktualisiert über n8n &amp; GitHub Pages</footer>
</div>

<script>
const CONFIG_URL = "https://raw.githubusercontent.com/luisbodenbachapriori/Dealuebersicht/main/overview-config.json";

const num = n => new Intl.NumberFormat("de-DE").format(n||0);
const pct = (cur,tgt) => tgt>0 ? Math.min(100,(cur/tgt)*100) : 0;
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const spLabel = s => s==='experts'?'Experts':s==='contracting'?'Contracting':'Gesamt';

let DATA = null;
let STATE = { sparte:'gesamt', location:'all' };

function rowsFor(sparte){
  const lb = (DATA&&DATA.leaderboard)||{};
  const ex = (lb.experts||[]).map(r=>Object.assign({sparte:'experts'},r));
  const co = (lb.contracting||[]).map(r=>Object.assign({sparte:'contracting'},r));
  if(sparte==='experts') return ex;
  if(sparte==='contracting') return co;
  return ex.concat(co);
}
const byLoc = (rows,loc) => loc==='all' ? rows : rows.filter(r=>(r.location||'').toUpperCase()===loc);
const sumDeals = rows => rows.reduce((a,b)=>a+(b.deals||0),0);

function update(){
  if(!DATA) return;
  const meta=DATA.meta||{}, goals=DATA.goals||{}, kpis=DATA.kpis||{};
  const sp=STATE.sparte, loc=STATE.location;

  const sel = byLoc(rowsFor(sp), loc);
  const dealsCount = sumDeals(sel);

  // ---- KPI-Karten ----
  const runner=kpis.activeRunner||{}, rahmen=kpis.rahmenvertraege||{}, team=kpis.teamSize||{};
  const gold = goals.gold && goals.gold.target;
  const cards = [];
  if(runner.target!=null) cards.push({accent:true,l:"Aktive Runner",
      v:num(runner.current)+'<span class="of"> / '+num(runner.target)+'</span>',
      sub:"Jahresziel · noch "+num(Math.max(0,(runner.target||0)-(runner.current||0)))+" bis Ziel",
      bar:"red",p:pct(runner.current,runner.target)});
  cards.push({l:"Deals "+(meta.quarter||"")+" · "+spLabel(sp),
      v:num(dealsCount)+(gold!=null?'<span class="of"> / '+num(gold)+'</span>':''),
      sub:gold!=null?"Gold-Ziel "+num(gold):"", bar:"red", p:gold!=null?pct(dealsCount,gold):null});
  if(rahmen.target!=null) cards.push({l:"Rahmenverträge",
      v:num(rahmen.current)+'<span class="of"> / '+num(rahmen.target)+'</span>',
      sub:"Ziel · noch "+num(Math.max(0,(rahmen.target||0)-(rahmen.current||0)))+" Partner",
      bar:"blue",p:pct(rahmen.current,rahmen.target)});
  if(team.total!=null) cards.push({l:"Team-Größe",v:num(team.total)+" Köpfe",
      sub:[team.recruiting!=null?num(team.recruiting)+" Recruiting":null,
           team.kam!=null?num(team.kam)+" KAM":null,
           team.berlin!=null?num(team.berlin)+" Berlin":null].filter(Boolean).join(" · ")});
  document.getElementById("kpis").innerHTML = cards.map(k=>
    `<div class="card${k.accent?' accent':''}"><div class="label">${esc(k.l)}</div>`+
    `<div class="value">${k.v}</div>`+
    (k.sub?`<div class="sub">${esc(k.sub)}</div>`:"")+
    (k.p!=null?`<div class="mini ${k.bar||'red'}"><span style="width:${k.p}%"></span></div>`:"")+
    `</div>`).join("");

  // ---- Ziel-Stufen (gefilterte Deal-Anzahl) ----
  document.getElementById("goalTitle").textContent = "Quartals-Challenge · Neue Deals ("+spLabel(sp)+")";
  const cur = dealsCount;
  const tiers = ["bronze","silber","gold"].map(k=>goals[k]).filter(t=>t&&t.target!=null);
  const maxTarget = Math.max(1, ...tiers.map(t=>t.target||0));
  const fillPct = Math.min(100,(cur/maxTarget)*100);
  let reached=null, next=null;
  ["bronze","silber","gold"].forEach(k=>{ const t=goals[k];
    if(t&&t.target!=null){ if(cur>=t.target) reached=t; else if(!next) next=t; } });
  const medal = c=>({bronze:"🥉",silber:"🥈",gold:"🥇"}[c]||"");
  const marks = tiers.map(t=>{
    const left=Math.min(100,((t.target||0)/maxTarget)*100);
    const cls=(t.label||"").toLowerCase();
    return `<div class="mark ${cls}" style="left:${left}%"><b>${medal(cls)} ${esc(t.label)}</b>${num(t.target)} Deals</div>`;
  }).join("");
  const nextLine = next ? `▲ noch <b style="color:var(--text)">${num(Math.max(0,(next.target||0)-cur))}</b> bis ${esc(next.label)}`
                        : (reached?`Top-Stufe ${esc(reached.label)} erreicht 🎉`:"");
  document.getElementById("goalbar").innerHTML =
    `<div class="tierline"><span>Aktuell: <b style="color:var(--text)">${num(cur)} Deals</b></span><span>${nextLine}</span></div>`+
    `<div class="track"><div class="fill" style="width:${fillPct}%"></div></div>`+
    `<div class="marks">${marks}</div>`+
    (reached ? `<span class="badge ${(reached.label||"").toLowerCase()}">★ ${esc(reached.label)} erreicht</span>`
             : `<span class="badge">Noch kein Tier erreicht</span>`);

  // ---- Standort-Battle (Sparte-abhängig, immer beide Standorte) ----
  document.getElementById("battlePill").textContent = spLabel(sp)+"-Deals";
  const all = rowsFor(sp);
  const fd = sumDeals(all.filter(r=>(r.location||'').toUpperCase()==='FFM'));
  const bd = sumDeals(all.filter(r=>(r.location||'').toUpperCase()==='B'));
  const dim = code => (loc!=='all' && loc!==code) ? 'opacity:.45;' : '';
  const side=(name,d,win,code)=>`<div class="side ${win?'win':''}" style="${dim(code)}"><div class="loc">${esc(name)}</div>`+
    `<div class="big">${num(d)}</div><div class="cap">Deals</div></div>`;
  document.getElementById("battleWrap").innerHTML =
    `<div class="battle">${side("Frankfurt",fd,fd>=bd,'FFM')}<div class="vs">VS</div>${side("Berlin",bd,bd>fd,'B')}</div>`;

  // ---- Leaderboards (gefiltert) ----
  function lbCard(title, rows){
    const sorted=[...rows].sort((a,b)=>(b.deals||0)-(a.deals||0));
    const body = sorted.length ? sorted.map((r,i)=>{
      const m=i===0?"🥇":i===1?"🥈":i===2?"🥉":(i+1);
      return `<div class="row"><div class="rank">${m}</div>`+
        `<div class="ini">${esc(r.initials||"")}</div>`+
        `<div class="who"><span class="nm">${esc(r.name||"")}${r.location?`<span class="loc-tag">${esc(r.location)}</span>`:""}</span></div>`+
        `<div class="dealn">${num(r.deals)}<small>Deals</small></div></div>`;
    }).join("") : `<div class="empty">Keine Placements im Filter.</div>`;
    return `<div class="lbcard"><div class="lbhead"><span class="sq"></span>${esc(title)}</div>${body}</div>`;
  }
  let cardsHtml="";
  if(sp==='gesamt'){
    cardsHtml = lbCard("Experts · Placements", byLoc(rowsFor('experts'),loc))
              + lbCard("Contracting · Placements", byLoc(rowsFor('contracting'),loc));
  } else {
    cardsHtml = lbCard(spLabel(sp)+" · Placements", sel);
  }
  document.getElementById("leaderWrap").innerHTML = cardsHtml;
}

function render(cfg){
  DATA = cfg;
  const meta=cfg.meta||{};
  document.getElementById("title").textContent = meta.title || "Team Dashboard";
  document.getElementById("subtitle").textContent = meta.subtitle || "";
  document.getElementById("quarter").textContent = meta.quarter ? "Überblick "+meta.quarter : "";
  if(meta.lastUpdated){
    const d=new Date(meta.lastUpdated);
    document.getElementById("updated").textContent =
      "Stand: "+d.toLocaleString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
  } else { document.getElementById("updated").textContent = ""; }
  update();
}

function showError(msg){
  document.getElementById("updated").textContent = "Laden fehlgeschlagen";
  document.getElementById("kpis").innerHTML =
    `<div class="errorbox"><div class="label">Fehler beim Laden der Daten</div><div class="msg">${esc(msg)}</div></div>`;
  ["goalbar","battleWrap","leaderWrap"].forEach(id=>document.getElementById(id).innerHTML="");
}

// Toggle-Verdrahtung
document.getElementById("toolbar").addEventListener("click", e=>{
  const btn = e.target.closest("button[data-val]");
  if(!btn) return;
  const group = btn.parentElement.getAttribute("data-group");
  [...btn.parentElement.children].forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  STATE[group] = btn.getAttribute("data-val");
  update();
});

async function load(){
  const btn = document.getElementById("reload");
  btn.disabled = true;
  document.getElementById("updated").textContent = "Lade Daten…";
  try{
    const res = await fetch(CONFIG_URL + "?t=" + Date.now(), { cache: "no-store" });
    if(!res.ok) throw new Error("HTTP " + res.status + " beim Abruf der Config");
    let cfg = await res.json();
    if(Array.isArray(cfg)) cfg = cfg[0] || {};
    render(cfg);
  }catch(e){
    showError(e.message + " — Prüfe, ob overview-config.json im Repo liegt und das Repo öffentlich ist.");
  }finally{
    btn.disabled = false;
  }
}

document.getElementById("reload").addEventListener("click", load);
load();
</script>
</body>
</html>
